<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dani Moto CarRP - Sistema V3</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.inputmask/5.0.6/jquery.inputmask.min.js"></script>

    <style>
        :root {
            --bg-color: #f4f7f6; --text-color: #0e141e; --primary: #2086c2;
            --secondary: #b9e5f5; --header-bg: #ffffff; --card-bg: #ffffff;
            --shadow: rgba(14, 20, 30, 0.15); --border: #ccc;
        }

        .dark-mode {
            --bg-color: #0e141e; --text-color: #f4f7f6; --primary: #2086c2;
            --secondary: #b9e5f5; --header-bg: #1a2436; --card-bg: #1a2436;
            --shadow: rgba(0, 0, 0, 0.5); --border: #334155;
        }

        .dark-mode .btn-primary { color: #0e141e !important; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); transition: 0.3s; padding-top: 80px; }

        /* HEADER & MENU HAMBURGER */
        header {
            position: fixed; top: 0; width: 100%; height: 70px;
            background-color: var(--header-bg); display: flex; justify-content: space-between;
            align-items: center; padding: 0 5%; box-shadow: 0 4px 15px var(--shadow); z-index: 1000;
        }
        .logo img { height: 50px; }

        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a { text-decoration: none; color: var(--text-color); font-weight: bold; cursor: pointer; }
        
        .hamburger { display: none; font-size: 28px; cursor: pointer; background: none; border: none; color: var(--text-color); }

        /* MODAIS */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: var(--card-bg); padding: 20px; border-radius: 12px;
            width: 95%; max-width: 850px; max-height: 90vh; overflow-y: auto;
            position: relative;
        }

        /* CORREÇÃO RADIO BUTTONS */
        input[type="radio"] { 
            width: 18px !important; 
            height: 18px !important; 
            vertical-align: middle; 
            margin-right: 5px;
            cursor: pointer;
        }
        label { cursor: pointer; margin-right: 15px; font-weight: 500; }

        /* INPUTS GERAIS */
        input:not([type="radio"]), select { 
            width: 100%; padding: 12px; margin: 8px 0; border: 1px solid var(--border); 
            border-radius: 8px; background: var(--bg-color); color: var(--text-color); 
        }

        .btn-primary { background: var(--primary); color: #fff; padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-danger { background: #e74c3c; color: #fff; padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; }

        /* TABELAS RESPONSIVAS (Mobile) */
        table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        th, td { border: 1px solid var(--border); padding: 10px; text-align: left; }
        th { background: var(--primary); color: white; }

        /* MOBILE DESIGN */
        @media (max-width: 768px) {
            .hamburger { display: block; }
            .nav-links {
                display: none; flex-direction: column; position: absolute; top: 70px; left: 0;
                width: 100%; background: var(--header-bg); padding: 20px; box-shadow: 0 10px 20px var(--shadow);
            }
            .nav-links.active { display: flex; }
            
            /* Tabela da O.S. vira lista no celular */
            table, thead, tbody, th, td, tr { display: block; }
            thead tr { position: absolute; top: -9999px; left: -9999px; }
            tr { border: 1px solid var(--border); margin-bottom: 10px; border-radius: 8px; padding: 5px; }
            td { border: none; position: relative; padding-left: 50%; }
            td:before { 
                position: absolute; left: 10px; width: 45%; padding-right: 10px; 
                white-space: nowrap; font-weight: bold; color: var(--primary);
                content: attr(data-label);
            }
            
            .os-grid-topo { grid-template-columns: 1fr !important; }
        }

        .os-grid-topo { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .total-geral { text-align: right; font-size: 1.4em; font-weight: bold; color: var(--primary); padding: 15px 0; }
        .tab-container { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 15px; }
        .tab { padding: 10px 15px; cursor: pointer; font-weight: bold; }
        .tab.active { border-bottom: 3px solid var(--primary); color: var(--primary); }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <img src="https://blogger.googleusercontent.com/img/a/AVvXsEhrN1KBe8sQKe7h8bnxC3-36ZaDu228yqknNmU2nL2pA19bg9ycjgXAciifU5Q8DGrkXE8EsD1hz7I0aIiWx23oAFR0w2m36nOsexMYdjITo0T8dPg9-jsJdpWnLzodSgOo_OmwE-lVNeYTde4g21o8uD203-23_mwYGgEGCMBdTffQF8yaxXcPvDxnu94">
        </div>
        <button class="hamburger" onclick="toggleMenu()">☰</button>
        <nav class="nav-links" id="menu">
            <a onclick="fecharModais(); toggleMenu()">Home</a>
            <a onclick="abrirOS(); toggleMenu()">O.S</a>
            <a onclick="abrirModal('modalCadastro'); toggleMenu()">Cadastro</a>
            <a onclick="abrirModal('modalConsulta'); toggleMenu()">Consultar</a>
            <button class="theme-btn" style="font-weight: bold; cursor: pointer; border: none; background: none; color: var(--text-color);" onclick="toggleTheme()">🌓 Tema</button>
        </nav>
    </header>

    <main style="text-align: center; padding: 40px 10px;">
        <div style="background: var(--card-bg); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px var(--shadow); max-width: 500px; margin: auto;">
            <h1 style="color: var(--primary);">Dani Moto CarRP</h1>
            <p>📱 (16) 99402-9362</p>
            <p>📍 Orestes Lopes de Camargo</p>
            <button class="btn-primary" style="margin-top: 20px; width: 100%;" onclick="abrirOS()">Acessar Sistema</button>
        </div>
    </main>









    <div id="modalCadastro" class="modal">
        <div class="modal-content">
            <div class="tab-container">
                <div class="tab active" onclick="switchTab(event, 'tabVeiculo')">Veículos</div>
                <div class="tab" onclick="switchTab(event, 'tabCliente')">Clientes</div>
            </div>
            
            <div id="tabVeiculo" style="display: block;" class="tab-body">
                <div style="margin-bottom: 10px;">
                    <input type="radio" name="vT" id="vC" value="Carro" checked> <label for="vC">Carro</label>
                    <input type="radio" name="vT" id="vM" value="Moto"> <label for="vM">Moto</label>
                </div>
                <input type="text" id="cadVPlaca" placeholder="Placa">
                <input type="text" id="cadVModelo" placeholder="Modelo">
                <input type="text" id="cadVCPF" placeholder="CPF Proprietário">
                
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button class="btn-primary" style="flex: 2;" onclick="salvarVeiculo()">Salvar Veículo</button>
                    <button class="btn-danger" style="flex: 1; background: #95a5a6;" onclick="limparCampos('tabVeiculo')">Limpar</button>
                </div>
            </div>

            <div id="tabCliente" style="display: none;" class="tab-body">
                <input type="text" id="cadCNome" placeholder="Nome / Razão Social">
                <input type="text" id="cadCCPF" placeholder="CPF">
                <input type="text" id="cadCTel" placeholder="Telefone">
                
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button class="btn-primary" style="flex: 2;" onclick="salvarCliente()">Salvar Cliente</button>
                    <button class="btn-danger" style="flex: 1; background: #95a5a6;" onclick="limparCampos('tabCliente')">Limpar</button>
                </div>
            </div>
            <button class="btn-danger" style="margin-top: 15px; width: 100%;" onclick="fecharModais()">Sair</button>
        </div>
    </div>









    <div id="modalConsulta" class="modal">
        <div class="modal-content">
            <div class="tab-container">
                <div class="tab active" onclick="switchTabConsulta(event, 'tabConsGeral')">Veículos e Clientes</div>
                <div class="tab" onclick="switchTabConsulta(event, 'tabConsOS')">Ordens de Serviço</div>
            </div>

            <div id="tabConsGeral" class="tab-body-cons" style="display: block;">
                <div style="margin: 10px 0;">
                    <input type="radio" name="bG" id="bP_G" checked onclick="aplicarMascaraBusca('placa', 'iB_G')"> <label for="bP_G">Placa</label>
                    <input type="radio" name="bG" id="bC_G" onclick="aplicarMascaraBusca('cpf', 'iB_G')"> <label for="bC_G">CPF</label>
                    <input type="radio" name="bG" id="bN_G" onclick="aplicarMascaraBusca('nome', 'iB_G')"> <label for="bN_G">Nome</label>
                </div>
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="iB_G" placeholder="Digite a Placa...">
                    <button class="btn-primary" onclick="realizarConsultaGeral()">Pesquisar</button>
                </div>
                <div id="resGeral" style="margin-top: 15px; border-top: 1px solid var(--border); padding-top: 10px; min-height: 50px;">
                    <p style="font-size: 14px; color: #888;">Nenhum resultado.</p>
                </div>
            </div>

            <div id="tabConsOS" class="tab-body-cons" style="display: none;">
                <div style="margin: 10px 0;">
                    <input type="radio" name="bO" id="bOS_P" checked onclick="aplicarMascaraBusca('placa', 'iB_OS')"> <label for="bOS_P">Placa</label>
                    <input type="radio" name="bO" id="bOS_C" onclick="aplicarMascaraBusca('cpf', 'iB_OS')"> <label for="bOS_C">CPF</label>
                    <input type="radio" name="bO" id="bOS_N" onclick="aplicarMascaraBusca('nome', 'iB_OS')"> <label for="bOS_N">Nome</label>
                    <input type="radio" name="bO" id="bOS_O" onclick="aplicarMascaraBusca('os', 'iB_OS')"> <label for="bOS_O">Nº O.S</label>
                </div>
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="iB_OS" placeholder="Digite a Placa...">
                    <button class="btn-primary" onclick="realizarConsultaOS()">Pesquisar O.S</button>
                </div>
                <div id="resOS" style="margin-top: 15px; border-top: 1px solid var(--border); padding-top: 10px; min-height: 50px;">
                    <p style="font-size: 14px; color: #888;">Nenhum resultado.</p>
                </div>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="btn-danger" style="flex: 1; background: #95a5a6;" onclick="limparBuscaConsulta()">Limpar Busca</button>
                <button class="btn-danger" style="flex: 1;" onclick="fecharModais()">Fechar</button>
            </div>
        </div>
    </div>










    <div id="modalOS" class="modal">
        <div class="modal-content">
            <h2 style="margin-bottom: 15px;">Nova O.S.</h2>
            <div class="os-grid-topo">
                <div><strong>Nº:</strong> <span id="nOS">0000</span></div>
                <div><strong>Data:</strong> <input type="date" id="dOS" style="padding: 5px;"></div>
                <div>
                    <input type="radio" name="tO" id="tOC" checked> <label for="tOC">Carro</label>
                    <input type="radio" name="tO" id="tOM"> <label for="tOM">Moto</label>
                </div>
            </div>

            <div class="os-grid-topo">
                <input type="text" id="osPlaca" placeholder="Placa do Veículo" style="text-transform: uppercase;">
                <input type="text" id="osC" placeholder="CPF do Cliente" onblur="buscarClienteAutomatico()">
                <input type="text" id="osN" placeholder="Nome / Razão Social" readonly title="Preenchido automaticamente">
            </div>
            <div class="os-grid-topo">
                <input type="text" id="osT" placeholder="Telefone" readonly title="Preenchido automaticamente">
                <div style="display: flex; align-items: center; color: var(--primary); font-size: 12px;" id="statusBusca"></div>
            </div>

            <table id="tbOS">
                <thead>
                    <tr>
                        <th>PEÇAS</th><th>QUANT.</th><th>DESCRIÇÃO</th><th>VALOR UNIT.</th><th>VALOR</th><th>X</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            <button class="btn-primary" onclick="addL()">+ Linha</button>
            <div class="total-geral">TOTAL: R$ <span id="tg">0.00</span></div>
            
            <button class="btn-primary" style="width: 100%; margin-bottom: 10px;" onclick="finalizarOS()">Finalizar e Salvar</button>
            <button class="btn-danger" style="width: 100%;" onclick="fecharModais()">Sair sem salvar</button>
        </div>
    </div>





    <script>
        $(document).ready(function(){
        // Máscaras fixas dos cadastros
        $(":input[placeholder='CPF']").inputmask("999.999.999-99");
        $(":input[placeholder='CPF Proprietário']").inputmask("999.999.999-99");
        $(":input[placeholder='Telefone']").inputmask("(99) 99999-9999");
        
        // Inicia o campo de busca sem máscara (pois inicia em Placa)
        aplicarMascaraBusca('placa');
    });
        




        // Adicione no topo do seu <script> se ainda não tiver:
        const API_URL = "https://script.google.com/macros/s/AKfycbyrlMQ25DDU3-zZjhByK7wKjU0bngdunu61dVTMaw-TnnsOAS5Hc_isujv3Ko-AW8zM/exec"; // Lembre-se de colar a URL do Apps Script aqui!

        // FUNÇÃO PARA LIMPAR CAMPOS
        function limparCampos(tabId) {
            const container = document.getElementById(tabId);
            const inputs = container.querySelectorAll('input:not([type="radio"])');
            inputs.forEach(input => input.value = '');
        }

        function limparConsulta() {
            document.getElementById('iB').value = '';
            document.getElementById('res').innerHTML = '<p style="font-size: 14px; color: #888;">Nenhum resultado.</p>';
        }

        // Variáveis para "Pré-carregamento" (Delay zero)
        let BANCO_DADOS = { clientes: [], veiculos: [], servicos: [] };

        // Função que roda ao abrir o sistema
        async function precarregarDados() {
            console.log("Sincronizando com Google Sheets...");
            try {
                const response = await fetch(API_URL);
                BANCO_DADOS = await response.json();
                console.log("Dados carregados com sucesso!");
            } catch (e) {
                console.error("Erro ao carregar dados", e);
            }
        }

        // Chamar o carregamento ao iniciar
        window.onload = () => {
            precarregarDados();
            addL(); // Adiciona linha na OS
        };

        // FUNÇÃO PARA BUSCAR CLIENTE PELO CPF (Sem Delay)
        function buscarC() {
            const cpfInformado = document.getElementById('osC').value;
            const cliente = BANCO_DADOS.clientes.find(c => c.CPF == cpfInformado);
            
            if (cliente) {
                document.getElementById('osN').value = cliente.Nome;
                document.getElementById('osT').value = cliente.Telefone;
                
                // Busca o veículo desse cliente para sugerir
                const veiculo = BANCO_DADOS.veiculos.find(v => v.CPF_Cliente == cpfInformado);
                if (veiculo) {
                    // Marca se é Carro ou Moto automaticamente
                    if (veiculo.Tipo === "Carro") document.getElementById('tOC').checked = true;
                    else document.getElementById('tOM').checked = true;
                }
            } else {
                alert("Cliente não encontrado! Cadastre-o primeiro.");
            }
        }





        // Ativa as máscaras no popup de O.S. quando o documento carregar
        $(document).ready(function(){
            $("#osC").inputmask("999.999.999-99");
            $("#osT").inputmask("(99) 99999-9999");
        });

        // Função para buscar cliente enquanto digita ou sai do campo CPF na O.S.
        function buscarClienteAutomatico() {
            const cpfDigitado = document.getElementById('osC').value;
            const status = document.getElementById('statusBusca');
            const campoNome = document.getElementById('osN');
            const campoTel = document.getElementById('osT');

            // Limpa apenas números para comparar
            const cpfLimpo = cpfDigitado.replace(/[^\d]+/g, '');

            if (cpfLimpo.length === 11) {
                status.innerText = "🔍 Buscando...";
                
                // Procura no banco de dados carregado da planilha
                const cliente = BANCO_DADOS.clientes.find(c => c.CPF.replace(/[^\d]+/g, '') === cpfLimpo);

                if (cliente) {
                    campoNome.value = cliente.Nome;
                    campoTel.value = cliente.Telefone;
                    status.innerHTML = "✅ Cliente localizado!";
                    status.style.color = "green";
                    
                    // Tenta localizar o veículo para marcar Carro ou Moto automaticamente
                    const veiculo = BANCO_DADOS.veiculos.find(v => v.CPF_Cliente.replace(/[^\d]+/g, '') === cpfLimpo);
                    if(veiculo) {
                        document.getElementById('osPlaca').value = veiculo.Placa;
                        if(veiculo.Tipo === "Moto") document.getElementById('tOM').checked = true;
                        else document.getElementById('tOC').checked = true;
                    }
                } else {
                    status.innerHTML = "❌ Não cadastrado.";
                    status.style.color = "red";
                    campoNome.value = "";
                    campoTel.value = "";
                }
            } else {
                status.innerText = "";
                campoNome.value = "";
                campoTel.value = "";
            }
        }






        function validarCPF(cpf) {
            cpf = cpf.replace(/[^\d]+/g,''); // Remove máscara
            return cpf.length === 11; // Validação básica de tamanho
        }

        async function salvarCliente() {
            const nome = document.getElementById('cadCNome').value;
            const cpf = document.getElementById('cadCCPF').value;
            const tel = document.getElementById('cadCTel').value;

            if (!nome || !validarCPF(cpf)) {
                alert("Por favor, insira um Nome e um CPF válido (11 dígitos).");
                return;
            }

            // Segue com o fetch...
        }








        // FUNÇÃO SALVAR CLIENTE
        async function salvarCliente() {
            const nome = document.getElementById('cadCNome').value;
            const cpf = document.getElementById('cadCCPF').value;
            const tel = document.getElementById('cadCTel').value;

            if (!nome || !cpf) return alert("Preencha Nome e CPF!");

            const dados = {
                action: "cadastrarCliente",
                nome: nome,
                cpf: cpf,
                telefone: tel
            };

            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(dados) });
                const result = await res.json();
                if (result.status === "sucesso") {
                    alert("Cliente cadastrado com sucesso!");
                    limparCampos('tabCliente');
                    precarregarDados(); // Atualiza a memória local
                }
            } catch (e) {
                alert("Erro ao salvar: " + e);
            }
        }

        // FUNÇÃO SALVAR VEÍCULO
        async function salvarVeiculo() {
            const placa = document.getElementById('cadVPlaca').value;
            const modelo = document.getElementById('cadVModelo').value;
            const cpf = document.getElementById('cadVCPF').value;
            const tipo = document.querySelector('input[name="vT"]:checked').value;

            if (!placa || !cpf) return alert("Preencha Placa e CPF do proprietário!");

            const dados = {
                action: "cadastrarVeiculo",
                placa: placa.toUpperCase(),
                modelo: modelo,
                cpf: cpf,
                tipo: tipo
            };

            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(dados) });
                const result = await res.json();
                if (result.status === "sucesso") {
                    alert("Veículo cadastrado com sucesso!");
                    limparCampos('tabVeiculo');
                    precarregarDados();
                }
            } catch (e) {
                alert("Erro ao salvar: " + e);
            }
        }







        // FUNÇÃO PARA FINALIZAR O.S ATUALIZADA
        async function finalizarOS() {
            const itens = [];
            
            // Varre a tabela pegando as peças preenchidas
            document.querySelectorAll('#tbOS tbody tr').forEach(tr => {
                const desc = tr.querySelector('td:nth-child(3) input').value;
                const val = tr.querySelector('.t').value;
                
                // Só adiciona se tiver descrição ou valor (evita salvar linhas em branco)
                if(desc.trim() !== "" || parseFloat(val) > 0) {
                    itens.push({ descricao: desc, valor: val });
                }
            });

            if(itens.length === 0) {
                return alert("Adicione pelo menos uma peça ou serviço na O.S. antes de salvar.");
            }

            const placaVeiculo = document.getElementById('osPlaca').value.toUpperCase();
            const numeroOS = document.getElementById('nOS').innerText;
            
            if(!placaVeiculo) {
                return alert("Por favor, preencha a Placa do Veículo!");
            }

            const dadosOS = {
                action: "salvarOS",
                numOS: numeroOS, // Aqui vai o número gerado no Popup
                placa: placaVeiculo, // Aqui vai a Placa do campo novo
                data: document.getElementById('dOS').value,
                totalGeral: document.getElementById('tg').innerText,
                itens: itens
            };

            // Altera o texto do botão para mostrar que está carregando
            const btn = event.target;
            const textoOriginal = btn.innerText;
            btn.innerText = "Salvando...";

            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(dadosOS) });
                const result = await res.json();
                
                if (result.status === "sucesso") {
                    alert("Ordem de Serviço salva com sucesso!");
                    precarregarDados(); // Atualiza a memória
                    fecharModais();
                    limparOS();
                }
            } catch (e) {
                alert("Erro ao salvar: " + e);
            } finally {
                btn.innerText = textoOriginal;
            }
        }






        // CONTROLE DE ABAS DA CONSULTA
        function switchTabConsulta(evt, tabId) {
            document.querySelectorAll('.tab-body-cons').forEach(b => b.style.display = 'none');
            const container = evt.currentTarget.parentElement;
            container.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).style.display = 'block';
            evt.currentTarget.classList.add('active');
        }

        // BOTÃO LIMPAR GERAL
        function limparBuscaConsulta() {
            document.getElementById('iB_G').value = '';
            document.getElementById('iB_OS').value = '';
            document.getElementById('resGeral').innerHTML = '<p style="color: #888;">Nenhum resultado.</p>';
            document.getElementById('resOS').innerHTML = '<p style="color: #888;">Nenhum resultado.</p>';
        }

        // APLICAR MÁSCARAS INTELIGENTES
        function aplicarMascaraBusca(tipo, campoId) {
            const campo = $("#" + campoId);
            campo.val(""); 
            campo.inputmask('remove'); 

            if (tipo === 'cpf') {
                campo.inputmask("999.999.999-99");
                campo.attr("placeholder", "000.000.000-00");
            } else if (tipo === 'nome') {
                campo.attr("placeholder", "Digite o Nome...");
            } else if (tipo === 'os') {
                campo.attr("placeholder", "Ex: 4582");
            } else {

        function realizarConsultaGeral() {
            const termoOriginal = document.getElementById('iB_G').value.trim();
            const termoLimpo = termoOriginal.replace(/[^\d\w]+/g, '').toUpperCase(); 
            const container = document.getElementById('resGeral');
            const bPlaca = document.getElementById('bP_G').checked;
            const bCPF = document.getElementById('bC_G').checked;
            const bNome = document.getElementById('bN_G').checked; // NOVO

            if (!termoOriginal) return alert("Digite algo para buscar!");
            container.innerHTML = '<p>Buscando...</p>';
            
            const limpar = (str) => String(str || "").replace(/[^\d\w]+/g, '').toUpperCase();
            let htmlResultado = "";

            if (bPlaca) {
                const veiculo = BANCO_DADOS.veiculos.find(v => limpar(v.Placa) === termoLimpo);
                if (veiculo) {
                    const dono = BANCO_DADOS.clientes.find(c => limpar(c.CPF) === limpar(veiculo.CPF_Cliente));
                    htmlResultado = `<h4>🚗 Veículo: ${veiculo.Placa}</h4><p>Dono: ${dono ? dono.Nome : "Não localizado"}</p>`;
                }
            } else {
                // Busca por CPF ou por NOME (matches parciais)
                const clientesEncontrados = bCPF 
                    ? BANCO_DADOS.clientes.filter(c => limpar(c.CPF) === termoLimpo)
                    : BANCO_DADOS.clientes.filter(c => c.Nome.toUpperCase().includes(termoOriginal.toUpperCase()));

                if (clientesEncontrados.length > 0) {
                    clientesEncontrados.forEach(cliente => {
                        const veiculosDesteDono = BANCO_DADOS.veiculos.filter(v => limpar(v.CPF_Cliente) === limpar(cliente.CPF));
                        const placas = veiculosDesteDono.map(v => v.Placa).join(', ');
                        htmlResultado += `
                            <div style="border-bottom: 1px solid #ddd; padding-bottom: 10px; margin-bottom: 10px;">
                                <h4>👤 ${cliente.Nome}</h4>
                                <p>CPF: ${cliente.CPF} | Tel: ${cliente.Telefone}</p>
                                <p>Veículos: ${placas || "Nenhum"}</p>
                            </div>`;
                    });
                }
            }
            container.innerHTML = htmlResultado || '<p style="color:red;">⚠️ Nenhum registro.</p>';
        }

        // NOVA CONSULTA DE O.S. (Cruza os dados para achar a OS)
        function realizarConsultaOS() {
            const termo = document.getElementById('iB_OS').value.trim();
            const termoLimpo = termo.replace(/[^\d\w]+/g, '').toUpperCase();
            if (!termo) return alert("Digite algo para buscar!");

            const bPlaca = document.getElementById('bOS_P').checked;
            const bCPF = document.getElementById('bOS_C').checked;
            const bNome = document.getElementById('bOS_N').checked;
            const bOS = document.getElementById('bOS_O').checked;

            let numerosEncontrados = []; // Guarda os "Num_OS" únicos
            
            // Procura em toda a tabela de Serviços
            BANCO_DADOS.servicos.forEach(serv => {
                if (!numerosEncontrados.includes(serv.Num_OS)) {
                    let match = false;
                    
                    // Cruzamento de dados para checar Dono e CPF
                    const veiculo = BANCO_DADOS.veiculos.find(v => v.Placa === serv.Placa);
                    const cliente = veiculo ? BANCO_DADOS.clientes.find(c => c.CPF === veiculo.CPF_Cliente) : null;

                    if (bOS && serv.Num_OS == termo) match = true;
                    if (bPlaca && serv.Placa && serv.Placa.toUpperCase().replace(/[^\w\d]+/g, '') === termoLimpo) match = true;
                    if (bCPF && cliente && cliente.CPF.replace(/[^\d]+/g, '') === termoLimpo) match = true;
                    if (bNome && cliente && cliente.Nome.toUpperCase().includes(termo.toUpperCase())) match = true;

                    if (match) numerosEncontrados.push(serv.Num_OS);
                }
            });

            const container = document.getElementById('resOS');
            if (numerosEncontrados.length > 0) {
                let html = "<h4>Ordens de Serviço Encontradas:</h4>";
                numerosEncontrados.forEach(numOS => {
                    const linhaOS = BANCO_DADOS.servicos.find(s => s.Num_OS == numOS);
                    html += `
                        <div style="border: 1px solid var(--border); padding: 10px; margin-bottom: 10px; border-radius: 8px;">
                            <strong>O.S. Nº: ${numOS}</strong> | Placa: ${linhaOS.Placa} <br>
                            Data: ${linhaOS.Data} | <strong>Total: R$ ${linhaOS.Total}</strong>
                            <button class="btn-primary" style="padding: 8px; margin-top: 10px; width: 100%; font-size: 14px;" onclick="imprimirA4('${numOS}')">🖨️ Imprimir / Visualizar O.S A4</button>
                        </div>`;
                });
                container.innerHTML = html;
            } else {
                container.innerHTML = "<p style='color:red'>Nenhuma O.S vinculada encontrada.</p>";
            }
        }

        function addL() {
            const row = document.querySelector('#tbOS tbody').insertRow();
            const cols = ['PEÇAS', 'QUANT.', 'DESCRIÇÃO', 'VALOR UNIT.', 'VALOR', 'AÇÃO'];
            row.innerHTML = `
                <td data-label="PEÇAS"><input type="text"></td>
                <td data-label="QUANT."><input type="number" class="q" value="1" oninput="calc(this)"></td>
                <td data-label="DESCRIÇÃO"><input type="text"></td>
                <td data-label="VALOR UNIT."><input type="number" class="u" step="0.01" oninput="calc(this)"></td>
                <td data-label="VALOR"><input type="text" class="t" readonly value="0.00"></td>
                <td data-label="AÇÃO"><button class="btn-danger" onclick="this.parentElement.parentElement.remove(); calcG();">X</button></td>
            `;
        }

        function calc(el) {
            const tr = el.closest('tr');
            const q = tr.querySelector('.q').value || 0;
            const u = tr.querySelector('.u').value || 0;
            tr.querySelector('.t').value = (q * u).toFixed(2);
            calcG();
        }

        function calcG() {
            let total = 0;
            document.querySelectorAll('.t').forEach(i => total += parseFloat(i.value || 0));
            document.getElementById('tg').innerText = total.toFixed(2);
        }
